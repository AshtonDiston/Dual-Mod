seek_combat.0002.a:0 "내가 그들을 처치할 것이다"
seek_combat.0002.a1:0 "당신은 단일 전투에서 상대를 죽입니다."
seek_combat.0002.a2:0 "당신은 살해당했습니다."
seek_combat.0002.b:0 "당신의 Sworn shield를 보내십시오."


seek_combat.00021.t:0 "전장 결투"
seek_combat.00021.desc:0 "우리의 노력은 소용이 없었고 나는 적진을 무너뜨릴 수도, 적에게 도전할 수도 없었다."
seek_combat.00021.a:0 "..."



seek_combat.0003.t:0 "전장 결투"
seek_combat.0003.desc:0 "당신은 쓰러진 적 위에 서서 승리의 무게를 어깨에 짊었습니다. 승리는 당신의 것입니다."
seek_combat.0003.a:0 "이겼다."


seek_combat.0005.t:0 "전장 결투"
seek_combat.0005.desc:0 "현장에서 당신에게 도전할 수 있다고 생각한 바보를 눕히기도 전에. 하!"
seek_combat.0005.a:0 "승리!"


seek_combat.0006.t:0 "전장 결투"
seek_combat.0006.desc:0 "Across the field you spot an enemy. He is making a push towards you, undoubtedly to challenge you in single combat."
seek_combat.0006.a:0 "군인들을 강화하라! 대형을 유지하라!"

seek_combat.0008.t:0 "전장 결투"
seek_combat.0008.desc:0 "천둥같은 충돌과 죽어가는 사람들의 비명 속에서 당신의 시선은 적을 향한다. 전장은 혼돈의 소용돌이이자 피와 강철이 난무하는 바다이다. 그러나 그 순간, 기회는 덧없는 그림자처럼 깜빡인다. 어쩌면 아마도 당신은 군중 사이로 길을 개척하여 그들 앞에 설 때까지 그들의 부하들을 하나씩 베어버릴 수도 있을 것이다. 위험은 엄청나며 삶과 죽음이 걸린 문제이지만 아마도 이 위험을 감수할 만한 가치가 있을 것이다."
seek_combat.0008.a:0 "너의 길은 여기에서 끝이다"
seek_combat.0008.b:0 "그를 사슬로 묶어라."
seek_combat.0008.c:0 "마에스터! 그들의 상처를 살펴라."

seek_combat_interaction:0 "#R 전장 결투# "

seek_combat_interaction_desc:0 "그들의 부하들을 뚫고 단일 전투에서 그들과 맞서세요."