##전장 결투/탐색 전투
seek_combat.00011.t:0 "전장 결투"
seek_combat.00011.desc:0 "피에 젖은 전장을 훑어보던 중 적의 군복을 입은 모습이 눈에 들어왔고, 그의 깃발이 바람에 반항적으로 펄럭였다. 시선이 마주치자 우리 사이의 거리가 좁아지는 것 같았고, 이제 이 잔혹한 전쟁의 춤 속에 우리의 운명이 얽혀 있다는 사실을 깨닫고 나는 내 혈관을 통해 결의가 솟아오르는 것을 느꼈다."
seek_combat.00011.a:0 "대형을 유지하고 수행원과 Sworn shield를 모아 이 적에 맞서라."
seek_combat.00011.b:0 "나는 일대일 전투로 그들을 만날 것이다."


seek_combat.0001.t:0 "전장 결투"
seek_combat.0001.desc:0 "천둥같은 충돌과 죽어가는 사람들의 비명 속에서 당신의 시선은 적을 향한다. 전장은 혼돈의 소용돌이이자 피와 강철이 난무하는 바다이다. 그러나 그 순간, 기회는 덧없는 그림자처럼 깜빡인다. 어쩌면 아마도 당신은 군중 사이로 길을 개척하여 그들 앞에 설 때까지 그들의 부하들을 하나씩 베어버릴 수도 있을 것이다. 위험은 엄청나며 삶과 죽음이 걸린 문제이지만 아마도 이 위험을 감수할 만한 가치가 있을 것이다."
seek_combat.0001.a:0 "공격하라!"
seek_combat.0001.b:0 "대형을 유지하라. 위험을 감수할 가치가 없다."


seek_combat.0002.t:0 "전장 결투"
seek_combat.0002.desc:0 "지독한 투쟁 끝에 당신은 적과 눈에 띄는 거리에 있다는 것을 알게 되었다. 이마에 땀과 피가 뒤섞이고, 노력으로 인해 숨이 거칠어졌다. 승리가 코앞에 다가왔고 최후의 일격이 거의 손에 잡히게 되었다. 그에게 다가가려면 먼저 남은 동료를 모두 처치해야 한다."
seek_combat.0002a.desc:0 "\n Attackers: \n #bold[seek_combat_attacker.GetFullName] #"
seek_combat.00021a.desc:0 "\n #bold[seek_combat_attacker_bodyguard_1.GetFullName]#"
